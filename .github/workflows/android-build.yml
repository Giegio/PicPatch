name: Android CI Build

# Definisce quando far partire l'azione
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      order_id:
        description: 'ID Ordine'
        required: true
      customer_email:
        description: 'Email cliente'
        required: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. Scarica il codice dal repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Configura il JDK (Java Development Kit)
      # Nota: Le versioni recenti di Android Studio/Gradle richiedono Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Concede i permessi di esecuzione allo script Gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Esegue la build di "Release" non firmata
      - name: Build Unsigned Release APK
        run: ./gradlew assembleRelease

      # 5. Firma l'APK usando l'azione r0adkll
      - name: Sign Release APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      # 6. Carica l'APK FIRMATO come "Artifact" scaricabile
      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: PicPatch-Release
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}

      # 7. Carica l'APK su Supabase Storage
      - name: Upload APK to Supabase Storage
        if: success()
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary "@${{ steps.sign_app.outputs.signedReleaseFile }}" \
            "${{ secrets.SUPABASE_URL }}/storage/v1/object/apks/${{ github.event.inputs.order_id }}/picpatch.apk"

      # 8. Notifica il successo a Supabase
      - name: Notify Success to Webhook
        if: success()
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{"order_id": "${{ github.event.inputs.order_id }}", "apk_url": "${{ secrets.SUPABASE_URL }}/storage/v1/object/public/apks/${{ github.event.inputs.order_id }}/picpatch.apk", "customer_email": "${{ github.event.inputs.customer_email }}"}' \
            "${{ secrets.SUPABASE_URL }}/functions/v1/github-webhook"

      # 9. Notifica il fallimento a Supabase
      - name: Notify Failure to Webhook
        if: failure()
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{"order_id": "${{ github.event.inputs.order_id }}", "status": "failed"}' \
            "${{ secrets.SUPABASE_URL }}/functions/v1/github-webhook"