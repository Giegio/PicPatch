name: Android CI Build

# Definisce quando far partire l'azione
on:
  push:
    branches: [ "main" ] # Cambia in "master" se la tua branch principale si chiama così
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. Scarica il codice dal repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Configura il JDK (Java Development Kit)
      # Nota: Le versioni recenti di Android Studio/Gradle richiedono Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Concede i permessi di esecuzione allo script Gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Esegue la build di "Release" non firmata
      - name: Build Unsigned Release APK
        run: ./gradlew assembleRelease

      # 5. Firma l'APK usando l'azione r0adkll
      - name: Sign Release APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      # 6. Carica l'APK FIRMATO come "Artifact" scaricabile
      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: PicPatch-Release
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}