name: Android CI Build

# Definisce quando far partire l'azione
on:
  push:
    branches: [ "main" ] # Cambia in "master" se la tua branch principale si chiama così
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. Scarica il codice dal repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Configura il JDK (Java Development Kit)
      # Nota: Le versioni recenti di Android Studio/Gradle richiedono Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Concede i permessi di esecuzione allo script Gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Esegue la build di debug e i test unitari
      - name: Build with Gradle
        run: ./gradlew assembleDebug

      # 5. Carica l'APK generato come "Artifact" così puoi scaricarlo da GitHub
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk