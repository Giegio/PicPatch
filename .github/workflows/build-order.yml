name: Build PicPatch APK from Order

on:
  repository_dispatch:
    types: [build_order]

jobs:
  build:
    name: Build Signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch order data from Supabase
        id: order
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          ORDER_ID="${{ github.event.client_payload.order_id }}"

          # Fetch order
          ORDER=$(curl -s "$SUPABASE_URL/rest/v1/orders?id=eq.$ORDER_ID&select=*" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY")

          echo "$ORDER" | node -e "
            const data = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            const order = data[0];
            if (!order) { console.error('Order not found'); process.exit(1); }
            require('fs').writeFileSync('/tmp/order.json', JSON.stringify(order));
            console.log('recipient=' + order.recipient_name);
            console.log('email=' + order.contact_email);
          " >> $GITHUB_OUTPUT

          # Fetch cards
          curl -s "$SUPABASE_URL/rest/v1/cards?order_id=eq.$ORDER_ID&order=card_index.asc&select=*" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -o /tmp/cards.json

          echo "CARD_COUNT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('/tmp/cards.json','utf8')).length)")" >> $GITHUB_OUTPUT

      - name: Download photos from Supabase Storage
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          mkdir -p app/src/main/assets/cards

          node -e "
            const cards = JSON.parse(require('fs').readFileSync('/tmp/cards.json','utf8'));
            cards.forEach(card => {
              if (card.photo_url) {
                const idx = String(card.card_index).padStart(2, '0');
                const dir = 'app/src/main/assets/cards/card_' + idx;
                require('fs').mkdirSync(dir, { recursive: true });
                console.log('PHOTO:' + idx + '=' + card.photo_url);
              }
            });
          " > /tmp/photos.txt

          while IFS='=' read -r key url; do
            case "$key" in
              PHOTO:*)
                IDX=$(echo "$key" | cut -d: -f2)
                echo "Downloading photo for card_$IDX from $url"
                curl -sL "$url" -o "app/src/main/assets/cards/card_$IDX/photo.jpg" || echo "WARN: Failed to download $url"
                ;;
            esac
          done < /tmp/photos.txt

      - name: Generate cards_config.json
        run: |
          node -e "
            const cards = JSON.parse(require('fs').readFileSync('/tmp/cards.json','utf8'));

            const config = {
              cards: cards.map(card => {
                const idx = String(card.card_index).padStart(2, '0');
                const c = {
                  id: card.card_index,
                  type: card.card_type,
                  title: card.title || '',
                  dedication: card.dedication || '',
                  photoPath: 'cards/card_' + idx + '/photo.jpg'
                };
                if (card.card_type === 'GPS' || card.card_type === 'HYBRID') {
                  c.gpsLat = card.gps_lat;
                  c.gpsLon = card.gps_lon;
                  c.gpsRadiusMeters = card.gps_radius_meters || 15.0;
                  if (card.gps_hint) c.gpsHint = card.gps_hint;
                }
                if (card.card_type === 'IMAGE_MARKER' || card.card_type === 'HYBRID') {
                  c.markerPath = 'cards/card_' + idx + '/marker.jpg';
                }
                return c;
              })
            };

            require('fs').writeFileSync(
              'app/src/main/assets/cards_config.json',
              JSON.stringify(config, null, 2)
            );
            console.log('Generated cards_config.json with', config.cards.length, 'cards');
          "

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Sign Release APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Get APK filename
        id: apk
        run: |
          APK_PATH="${{ steps.sign_app.outputs.signedReleaseFile }}"
          APK_NAME="PicPatch-${{ github.event.client_payload.order_number }}.apk"
          cp "$APK_PATH" "/tmp/$APK_NAME"
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ORDER_ID="${{ github.event.client_payload.order_id }}"
          gh release create "order-$ORDER_ID" \
            --title "PicPatch — ${{ steps.order.outputs.recipient }}" \
            --notes "Custom build for **${{ steps.order.outputs.email }}**
            **Order:** \`${{ github.event.client_payload.order_number }}\`
            **Cards:** ${{ steps.order.outputs.CARD_COUNT }}" \
            --repo ${{ github.repository }} \
            --prerelease \
            "/tmp/${{ steps.apk.outputs.apk_name }}" || echo "Release may already exist"

          echo "download_url=https://github.com/${{ github.repository }}/releases/download/order-$ORDER_ID/${{ steps.apk.outputs.apk_name }}" >> $GITHUB_OUTPUT

      - name: Notify Supabase webhook
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          curl -s -X POST "$SUPABASE_URL/functions/v1/github-webhook" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -d "{
              \"action\": \"build_complete\",
              \"order_id\": \"${{ github.event.client_payload.order_id }}\",
              \"order_number\": \"${{ github.event.client_payload.order_number }}\",
              \"customer_email\": \"${{ steps.order.outputs.email }}\",
              \"apk_url\": \"${{ steps.release.outputs.download_url }}\"
            }" && echo "" || echo "Webhook notification failed"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: picpatch-${{ github.event.client_payload.order_number }}
          path: /tmp/${{ steps.apk.outputs.apk_name }}
          retention-days: 30
